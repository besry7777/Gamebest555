<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lonely Creature</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #050810;
    --void: #080d1a;
    --mist: #1a2040;
    --glow: #7090ff;
    --pulse: #a080ff;
    --creature: rgba(200,220,255,0.92);
    --fog: rgba(80,100,180,0.08);
    --ripple: rgba(100,160,255,0.6);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Cormorant Garamond', serif;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
  }

  #title {
    text-align: center;
    padding-top: max(44px, env(safe-area-inset-top));
    letter-spacing: 0.35em;
    font-size: clamp(13px, 4vw, 17px);
    font-weight: 300;
    color: rgba(200,215,255,0.55);
    text-transform: uppercase;
  }

  #hint {
    position: fixed;
    bottom: max(34px, env(safe-area-inset-bottom));
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(11px, 3.2vw, 14px);
    font-weight: 300;
    font-style: italic;
    color: rgba(160,180,255,0.4);
    letter-spacing: 0.08em;
    transition: opacity 1.4s ease;
  }

  #track-display {
    position: fixed;
    bottom: max(68px, calc(env(safe-area-inset-bottom) + 34px));
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(10px, 2.8vw, 13px);
    color: rgba(160,180,255,0.35);
    letter-spacing: 0.12em;
    font-style: italic;
    opacity: 0;
    transition: opacity 2s ease;
  }

  #mood-indicator {
    position: fixed;
    top: max(80px, calc(env(safe-area-inset-top) + 36px));
    right: 18px;
    font-size: 10px;
    color: rgba(160,180,255,0.3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-style: normal;
  }

  #sleep-veil {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(5,8,16,0.8) 100%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 3s ease;
    z-index: 5;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="ui">
  <div id="title">Lonely Creature</div>
  <div id="mood-indicator" id="mood">—</div>
</div>
<div id="hint">Interact by touching the screen</div>
<div id="track-display"></div>
<div id="sleep-veil"></div>

<script>
// ─── Canvas Setup ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const trackDisplay = document.getElementById('track-display');
const sleepVeil = document.getElementById('sleep-veil');
const moodEl = document.getElementById('mood-indicator');

let W, H, dpr;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}
resize();
window.addEventListener('resize', resize);

// ─── Math Utils ───────────────────────────────────────────────
const PI2 = Math.PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;
const dist = (ax, ay, bx, by) => Math.hypot(bx - ax, by - ay);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const rnd = (a, b) => a + Math.random() * (b - a);
const rndInt = (a, b) => Math.floor(rnd(a, b + 1));

// ─── Time ─────────────────────────────────────────────────────
let t = 0; // global frame counter
let lastTime = 0;
let fps = 60;

// ─── Noise (simple value noise) ───────────────────────────────
const noiseCache = new Float32Array(512);
for (let i = 0; i < 512; i++) noiseCache[i] = Math.random() * 2 - 1;
function noise(x, y = 0) {
  const ix = Math.floor(x) & 255, iy = Math.floor(y) & 255;
  const fx = x - Math.floor(x), fy = y - Math.floor(y);
  const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
  const a = noiseCache[(ix + iy * 57) & 511];
  const b = noiseCache[(ix + 1 + iy * 57) & 511];
  const c = noiseCache[(ix + (iy + 1) * 57) & 511];
  const d = noiseCache[(ix + 1 + (iy + 1) * 57) & 511];
  return lerp(lerp(a, b, ux), lerp(c, d, ux), uy);
}

// ─── Particles ────────────────────────────────────────────────
const NUM_PARTICLES = 60;
const particles = [];
for (let i = 0; i < NUM_PARTICLES; i++) {
  particles.push({
    x: rnd(0, W), y: rnd(0, H),
    vx: rnd(-0.12, 0.12), vy: rnd(-0.25, -0.05),
    size: rnd(0.8, 2.4),
    alpha: rnd(0.1, 0.45),
    baseAlpha: rnd(0.1, 0.45),
    twinkleSpeed: rnd(0.008, 0.025),
    twinkleOffset: rnd(0, PI2)
  });
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y < -5) { p.y = H + 5; p.x = rnd(0, W); }
    if (p.x < -5) p.x = W + 5;
    if (p.x > W + 5) p.x = -5;
    p.alpha = p.baseAlpha * (0.5 + 0.5 * Math.sin(t * p.twinkleSpeed + p.twinkleOffset));
  }
}

// ─── Rain ─────────────────────────────────────────────────────
const rainDrops = [];
for (let i = 0; i < 80; i++) {
  rainDrops.push({
    x: rnd(0, W), y: rnd(-H, H),
    len: rnd(12, 28),
    speed: rnd(6, 14),
    alpha: rnd(0.03, 0.12)
  });
}
function updateRain() {
  for (const d of rainDrops) {
    d.y += d.speed;
    d.x += d.speed * 0.1;
    if (d.y > H + d.len) { d.y = -d.len; d.x = rnd(0, W); }
  }
}

// ─── Fog Blobs ────────────────────────────────────────────────
const fogBlobs = [];
for (let i = 0; i < 5; i++) {
  fogBlobs.push({
    x: rnd(-100, W + 100), y: rnd(H * 0.4, H),
    rx: rnd(180, 340), ry: rnd(60, 120),
    alpha: rnd(0.04, 0.11),
    speed: rnd(0.05, 0.18),
    phase: rnd(0, PI2)
  });
}

// ─── Ripples ──────────────────────────────────────────────────
const ripples = [];
function spawnRipple(x, y) {
  ripples.push({ x, y, r: 0, maxR: rnd(60, 100), alpha: 0.7, speed: rnd(1.8, 2.8) });
}
function updateRipples() {
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += r.speed;
    r.alpha = 0.7 * (1 - r.r / r.maxR);
    if (r.r >= r.maxR) ripples.splice(i, 1);
  }
}

// ─── Creature IK ──────────────────────────────────────────────
const SEG_COUNT = 40;
const SEG_LEN = 16;  // distance between segments

class Creature {
  constructor(x, y) {
    this.segments = [];
    for (let i = 0; i < SEG_COUNT; i++) {
      this.segments.push({ x: x - i * SEG_LEN, y });
    }
    // Head velocity
    this.vx = rnd(-0.5, 0.5);
    this.vy = rnd(-0.5, 0.5);
    this.speed = 1.8;
    this.targetX = x;
    this.targetY = y;
    this.state = 'wander'; // wander | follow | observe | sleep
    this.stateTimer = 0;
    this.observeTimer = 0;
    this.inactiveTimer = 0;
    this.sleeping = false;
    this.sleepAlpha = 0;
    this.legPhase = 0;
    this.noiseOffX = rnd(0, 100);
    this.noiseOffY = rnd(100, 200);
    this.mood = 'calm'; // calm | curious | energetic | melancholy
    this.moodSpeed = 1;

    // Leg positions (per side, per segment group)
    this.legPositions = [];
    for (let i = 0; i < SEG_COUNT; i++) {
      this.legPositions.push({
        left:  { x: 0, y: 0, targetX: 0, targetY: 0, planted: false, stepTimer: 0 },
        right: { x: 0, y: 0, targetX: 0, targetY: 0, planted: false, stepTimer: 0 }
      });
    }
  }

  setTarget(x, y) {
    this.targetX = x;
    this.targetY = y;
    this.state = 'follow';
    this.stateTimer = 180 + rndInt(0, 120);
  }

  wake() {
    this.sleeping = false;
    this.inactiveTimer = 0;
    this.state = 'wander';
  }

  update(dt) {
    const head = this.segments[0];
    const spd = this.speed * this.moodSpeed;

    // Inactivity → sleep
    if (!this.sleeping) {
      this.inactiveTimer++;
      if (this.inactiveTimer > 600) {
        this.sleeping = true;
        this.state = 'sleep';
        this.inactiveTimer = 0;
      }
    }

    if (this.state === 'sleep') {
      this.sleepAlpha = Math.min(1, this.sleepAlpha + 0.01);
      // Gentle sway only
      head.x += Math.sin(t * 0.008) * 0.15;
      head.y += Math.sin(t * 0.011) * 0.1;
    } else {
      this.sleepAlpha = Math.max(0, this.sleepAlpha - 0.02);
    }

    if (this.state === 'wander') {
      // Noise-based wandering
      const nx = noise(t * 0.003 + this.noiseOffX) * 2.2;
      const ny = noise(t * 0.003 + this.noiseOffY) * 2.2;
      this.vx = lerp(this.vx, nx, 0.02);
      this.vy = lerp(this.vy, ny, 0.02);

      // Boundary avoidance
      const margin = 80;
      if (head.x < margin) this.vx += 0.25;
      if (head.x > W - margin) this.vx -= 0.25;
      if (head.y < margin) this.vy += 0.25;
      if (head.y > H - margin) this.vy -= 0.25;

      head.x += this.vx * spd;
      head.y += this.vy * spd;

      // Occasionally stop
      this.stateTimer++;
      if (this.stateTimer > 300 && Math.random() < 0.003) {
        this.state = 'observe';
        this.observeTimer = rndInt(60, 180);
        this.stateTimer = 0;
      }

    } else if (this.state === 'follow') {
      const dx = this.targetX - head.x;
      const dy = this.targetY - head.y;
      const d = Math.hypot(dx, dy);

      if (d > 30) {
        this.vx = lerp(this.vx, (dx / d) * 2.5, 0.08);
        this.vy = lerp(this.vy, (dy / d) * 2.5, 0.08);
        head.x += this.vx * spd;
        head.y += this.vy * spd;
        this.inactiveTimer = 0;
      } else {
        // Reached target — observe
        this.state = 'observe';
        this.observeTimer = rndInt(80, 200);
      }
      this.stateTimer--;
      if (this.stateTimer <= 0) { this.state = 'wander'; this.stateTimer = 0; }

    } else if (this.state === 'observe') {
      // Slow drift
      head.x += this.vx * 0.1;
      head.y += this.vy * 0.1;
      this.observeTimer--;
      if (this.observeTimer <= 0) this.state = 'wander';
    }

    // Clamp
    head.x = clamp(head.x, 20, W - 20);
    head.y = clamp(head.y, 20, H - 20);

    // IK chain: each segment follows the one ahead
    for (let i = 1; i < SEG_COUNT; i++) {
      const prev = this.segments[i - 1];
      const seg = this.segments[i];
      const dx = seg.x - prev.x;
      const dy = seg.y - prev.y;
      const d = Math.hypot(dx, dy);
      if (d > SEG_LEN) {
        const ratio = (d - SEG_LEN) / d;
        seg.x -= dx * ratio * 0.9;
        seg.y -= dy * ratio * 0.9;
      }
    }

    // Leg phase
    const vel = Math.hypot(this.vx, this.vy);
    this.legPhase += vel * 0.15 * this.moodSpeed;
  }

  draw(ctx) {
    const segs = this.segments;
    const sleeping = this.sleeping;
    const baseAlpha = sleeping ? 0.45 : 1.0;

    // ── Glow under body ──
    const head = segs[0];
    const grad = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 70);
    grad.addColorStop(0, `rgba(100,140,255,${0.08 * baseAlpha})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(head.x, head.y, 70, 70, 0, 0, PI2);
    ctx.fill();

    // ── Legs ──
    this.drawLegs(ctx, baseAlpha);

    // ── Body segments ──
    ctx.save();
    ctx.shadowColor = 'rgba(130,170,255,0.5)';
    ctx.shadowBlur = 12;
    for (let i = SEG_COUNT - 1; i >= 0; i--) {
      const seg = segs[i];
      const nextSeg = segs[Math.min(i + 1, SEG_COUNT - 1)];
      const t_ratio = i / SEG_COUNT;
      // Size: bigger at front, tapering toward tail
      const size = i === 0 ? 11 : lerp(9, 3.5, t_ratio);
      const alpha = lerp(0.95, 0.55, t_ratio) * baseAlpha;

      // Segment color: pearlescent white-blue
      const r = Math.round(lerp(210, 160, t_ratio));
      const g = Math.round(lerp(225, 190, t_ratio));
      const b = Math.round(lerp(255, 240, t_ratio));

      ctx.globalAlpha = alpha;

      // Draw vertebra ellipse
      const dx = seg.x - nextSeg.x;
      const dy = seg.y - nextSeg.y;
      const angle = Math.atan2(dy, dx);

      ctx.save();
      ctx.translate(seg.x, seg.y);
      ctx.rotate(angle);

      // Outer ring
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.6})`;
      ctx.lineWidth = size * 0.25;
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 1.1, size * 0.75, 0, 0, PI2);
      ctx.stroke();

      // Inner body
      const sg = ctx.createRadialGradient(0, -size * 0.2, 0, 0, 0, size);
      sg.addColorStop(0, `rgba(${r},${g},${b},${alpha})`);
      sg.addColorStop(0.7, `rgba(${Math.round(r*0.7)},${Math.round(g*0.7)},${Math.round(b*0.85)},${alpha * 0.8})`);
      sg.addColorStop(1, `rgba(${Math.round(r*0.4)},${Math.round(g*0.4)},${Math.round(b*0.6)},0)`);
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.ellipse(0, 0, size, size * 0.7, 0, 0, PI2);
      ctx.fill();

      ctx.restore();
    }
    ctx.restore();

    // ── Head details ──
    this.drawHead(ctx, baseAlpha);

    // ── Sleep ZZZ ──
    if (this.sleepAlpha > 0.01) {
      this.drawSleepZzz(ctx);
    }
  }

  drawLegs(ctx, baseAlpha) {
    const segs = this.segments;
    const legSpacing = 2; // every N segments has legs
    ctx.save();
    ctx.shadowBlur = 0;

    for (let i = 2; i < SEG_COUNT - 2; i += legSpacing) {
      const seg = segs[i];
      const nextSeg = segs[Math.min(i + 1, SEG_COUNT - 1)];
      const dx = nextSeg.x - seg.x;
      const dy = nextSeg.y - seg.y;
      const angle = Math.atan2(dy, dx);
      const perp = angle + Math.PI / 2;

      const t_ratio = i / SEG_COUNT;
      const legLen = lerp(20, 10, t_ratio);
      const alpha = lerp(0.65, 0.3, t_ratio) * baseAlpha;
      const legOffset = (i % 4 === 0) ? 0 : Math.PI;
      const wave = Math.sin(this.legPhase + i * 0.6 + legOffset) * 0.5;
      const wave2 = Math.sin(this.legPhase + i * 0.6 + legOffset + Math.PI) * 0.5;

      // Each side leg — 2 joints
      for (let side = -1; side <= 1; side += 2) {
        const baseX = seg.x + Math.cos(perp) * side * 7;
        const baseY = seg.y + Math.sin(perp) * side * 7;

        // Mid joint
        const waveUse = side === -1 ? wave : wave2;
        const midAngle = perp + side * (0.6 + waveUse * 0.4);
        const midLen = legLen * 0.55;
        const midX = baseX + Math.cos(midAngle) * side * midLen;
        const midY = baseY + Math.sin(midAngle) * side * midLen;

        // Tip
        const tipAngle = midAngle + side * (0.5 + waveUse * 0.5);
        const tipX = midX + Math.cos(tipAngle) * side * legLen * 0.55;
        const tipY = midY + Math.sin(tipAngle) * side * legLen * 0.55;

        const r = Math.round(lerp(200, 150, t_ratio));
        const g2 = Math.round(lerp(220, 180, t_ratio));

        ctx.strokeStyle = `rgba(${r},${g2},255,${alpha})`;
        ctx.lineWidth = lerp(1.4, 0.6, t_ratio);
        ctx.lineCap = 'round';
        ctx.globalAlpha = alpha;

        ctx.beginPath();
        ctx.moveTo(baseX, baseY);
        ctx.quadraticCurveTo(midX, midY, tipX, tipY);
        ctx.stroke();

        // Tiny claw tip
        ctx.globalAlpha = alpha * 0.8;
        ctx.lineWidth = lerp(1.0, 0.4, t_ratio);
        const clawLen = 4;
        for (let c = -1; c <= 1; c += 2) {
          ctx.beginPath();
          ctx.moveTo(tipX, tipY);
          ctx.lineTo(
            tipX + Math.cos(tipAngle + side * c * 0.45) * side * clawLen,
            tipY + Math.sin(tipAngle + side * c * 0.45) * side * clawLen
          );
          ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

  drawHead(ctx, baseAlpha) {
    const head = this.segments[0];
    const neck = this.segments[1];
    const headAngle = Math.atan2(head.y - neck.y, head.x - neck.x);
    const eyeSpread = 0.55;
    const eyeDist = 7;

    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(headAngle);

    // Skull dome
    ctx.shadowColor = 'rgba(130,170,255,0.7)';
    ctx.shadowBlur = 16;

    const skullGrad = ctx.createRadialGradient(-3, -4, 0, 0, 0, 13);
    skullGrad.addColorStop(0, `rgba(230,240,255,${0.95 * baseAlpha})`);
    skullGrad.addColorStop(0.6, `rgba(160,190,255,${0.75 * baseAlpha})`);
    skullGrad.addColorStop(1, `rgba(80,110,200,${0.3 * baseAlpha})`);
    ctx.fillStyle = skullGrad;
    ctx.beginPath();
    ctx.ellipse(2, 0, 13, 10, 0, 0, PI2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Eyes — two glowing orbs
    for (let s = -1; s <= 1; s += 2) {
      const ex = 5;
      const ey = s * eyeDist * 0.55;
      // Eye socket
      ctx.fillStyle = `rgba(10,15,40,${0.9 * baseAlpha})`;
      ctx.beginPath();
      ctx.ellipse(ex, ey, 4, 3.5, 0, 0, PI2);
      ctx.fill();

      // Eye glow
      const eyeGrad = ctx.createRadialGradient(ex, ey, 0, ex, ey, 3.5);
      const blink = this.sleeping ? 0.1 : (1 - Math.abs(Math.sin(t * 0.015 + s * 2)) * 0.7);
      eyeGrad.addColorStop(0, `rgba(180,220,255,${0.95 * blink * baseAlpha})`);
      eyeGrad.addColorStop(0.5, `rgba(80,140,255,${0.7 * blink * baseAlpha})`);
      eyeGrad.addColorStop(1, `rgba(20,60,180,0)`);
      ctx.fillStyle = eyeGrad;
      ctx.beginPath();
      ctx.ellipse(ex, ey, 3.5, 3, 0, 0, PI2);
      ctx.fill();
    }

    // Mandibles
    ctx.strokeStyle = `rgba(190,215,255,${0.7 * baseAlpha})`;
    ctx.lineWidth = 1.2;
    for (let s = -1; s <= 1; s += 2) {
      ctx.beginPath();
      ctx.moveTo(12, s * 3);
      ctx.quadraticCurveTo(20, s * 6, 24, s * 4);
      ctx.stroke();
      // Mandible tip claw
      ctx.beginPath();
      ctx.moveTo(24, s * 4);
      ctx.lineTo(27, s * 2);
      ctx.stroke();
    }

    // Antennae
    ctx.strokeStyle = `rgba(160,200,255,${0.5 * baseAlpha})`;
    ctx.lineWidth = 0.8;
    const antWave = Math.sin(t * 0.04) * 12;
    for (let s = -1; s <= 1; s += 2) {
      ctx.beginPath();
      ctx.moveTo(10, s * 5);
      ctx.quadraticCurveTo(20 + antWave * 0.3, s * 14 + antWave * 0.5, 35, s * (10 + antWave * 0.6));
      ctx.stroke();
    }

    ctx.restore();
  }

  drawSleepZzz(ctx) {
    const head = this.segments[0];
    ctx.save();
    ctx.globalAlpha = this.sleepAlpha * 0.7;
    ctx.font = 'italic 300 14px Cormorant Garamond, serif';
    ctx.fillStyle = 'rgba(180,200,255,0.8)';
    const zOffsets = [
      { x: 14, y: -18, scale: 0.7, phase: 0 },
      { x: 22, y: -28, scale: 0.85, phase: 0.5 },
      { x: 30, y: -40, scale: 1, phase: 1 }
    ];
    for (const z of zOffsets) {
      const floatY = Math.sin(t * 0.02 + z.phase) * 4;
      const a = (0.5 + 0.5 * Math.sin(t * 0.018 + z.phase));
      ctx.globalAlpha = this.sleepAlpha * 0.55 * a;
      ctx.font = `italic 300 ${Math.round(12 * z.scale)}px Cormorant Garamond, serif`;
      ctx.fillText('z', head.x + z.x, head.y + z.y + floatY);
    }
    ctx.restore();
  }
}

// ─── Create Creature ──────────────────────────────────────────
const creature = new Creature(W / 2, H / 2);

// ─── Background ───────────────────────────────────────────────
// Pre-render star field to offscreen canvas
let starCanvas, starCtx;
function buildStarField() {
  starCanvas = document.createElement('canvas');
  starCanvas.width = W; starCanvas.height = H;
  starCtx = starCanvas.getContext('2d');

  // Deep background gradient
  const bg = starCtx.createRadialGradient(W * 0.5, H * 0.3, 0, W * 0.5, H * 0.5, H * 0.8);
  bg.addColorStop(0, '#1a2050');
  bg.addColorStop(0.45, '#0d1228');
  bg.addColorStop(1, '#05080f');
  starCtx.fillStyle = bg;
  starCtx.fillRect(0, 0, W, H);

  // Moon glow
  const moon = starCtx.createRadialGradient(W * 0.55, H * 0.12, 0, W * 0.55, H * 0.12, 160);
  moon.addColorStop(0, 'rgba(180,200,255,0.18)');
  moon.addColorStop(0.4, 'rgba(120,150,255,0.08)');
  moon.addColorStop(1, 'rgba(60,80,200,0)');
  starCtx.fillStyle = moon;
  starCtx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 200; i++) {
    const sx = rnd(0, W), sy = rnd(0, H * 0.7);
    const ss = rnd(0.4, 1.6);
    const sa = rnd(0.3, 0.9);
    starCtx.fillStyle = `rgba(200,215,255,${sa})`;
    starCtx.beginPath();
    starCtx.arc(sx, sy, ss, 0, PI2);
    starCtx.fill();
  }
}
buildStarField();
window.addEventListener('resize', buildStarField);

// ─── Draw Background ──────────────────────────────────────────
function drawBackground() {
  ctx.drawImage(starCanvas, 0, 0);

  // Animated fog
  for (const fog of fogBlobs) {
    const fx = fog.x + Math.sin(t * 0.003 + fog.phase) * 40;
    const fy = fog.y + Math.sin(t * 0.002 + fog.phase * 1.3) * 15;
    const g = ctx.createRadialGradient(fx, fy, 0, fx, fy, fog.rx);
    g.addColorStop(0, `rgba(80,100,200,${fog.alpha})`);
    g.addColorStop(0.5, `rgba(60,80,160,${fog.alpha * 0.5})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.save();
    ctx.scale(1, fog.ry / fog.rx);
    ctx.beginPath();
    ctx.arc(fx, fy * (fog.rx / fog.ry), fog.rx, 0, PI2);
    ctx.restore();
    ctx.fill();
  }
}

function drawRain() {
  ctx.save();
  ctx.strokeStyle = 'rgba(180,200,255,0.09)';
  ctx.lineWidth = 0.7;
  for (const d of rainDrops) {
    ctx.globalAlpha = d.alpha;
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x + d.len * 0.08, d.y + d.len);
    ctx.stroke();
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2.5);
    g.addColorStop(0, 'rgba(200,220,255,1)');
    g.addColorStop(1, 'rgba(120,160,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 2.5, 0, PI2);
    ctx.fill();
    ctx.restore();
  }
}

function drawRipples() {
  ctx.save();
  for (const r of ripples) {
    const rings = 3;
    for (let k = 0; k < rings; k++) {
      const rk = r.r - k * 14;
      if (rk < 0) continue;
      const alpha = r.alpha * (1 - k / rings) * 0.8;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = `rgba(100,160,255,${alpha})`;
      ctx.lineWidth = lerp(2.0, 0.5, r.r / r.maxR);
      ctx.beginPath();
      ctx.ellipse(r.x, r.y, rk, rk * 0.28, 0, 0, PI2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ─── Touch / Interaction ──────────────────────────────────────
let firstTouch = false;
let lastTouchTime = 0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const x = touch.clientX, y = touch.clientY;

  if (!firstTouch) {
    firstTouch = true;
    hint.style.opacity = '0';
    startAudio();
  }

  if (creature.sleeping) creature.wake();

  spawnRipple(x, y);
  spawnRipple(x, y); // double for intensity
  creature.setTarget(x, y);
  lastTouchTime = t;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const x = touch.clientX, y = touch.clientY;
  if (Math.random() < 0.2) spawnRipple(x, y);
  creature.setTarget(x, y);
  lastTouchTime = t;
}, { passive: false });

// ─── Audio System ─────────────────────────────────────────────
// Using Jamendo API for copyright-free music
const JAMENDO_KEY = 'b6747d04';
let audioCtx = null;
let currentSource = null;
let gainNode = null;
let currentTrackName = '';
let playlist = [];
let playlistIndex = 0;
let audioStarted = false;
let nextTrackTimer = 0;
let trackDuration = 0;

const MOODS = ['ambient', 'electronic', 'classical', 'acoustic'];
const JAMENDO_TRACKS = [
  // Curated fallback tracks from Jamendo (public domain / CC)
  { name: 'Midnight Drift', url: 'https://storage.googleapis.com/media-session/elephants-dream/the-wires.mp3' },
];

async function fetchJamendoTracks() {
  try {
    const tags = MOODS[rndInt(0, MOODS.length - 1)];
    const url = `https://api.jamendo.com/v3.0/tracks/?client_id=${JAMENDO_KEY}&format=json&limit=10&tags=${tags}&include=musicinfo&audioformat=mp32`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      playlist = data.results.map(tr => ({
        name: tr.name,
        artist: tr.artist_name,
        url: tr.audio,
        duration: tr.duration
      }));
      playlistIndex = 0;
    }
  } catch (e) {
    // Use built-in relaxed tone generation if API fails
    playlist = [];
  }
}

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;
  gainNode.connect(audioCtx.destination);

  fetchJamendoTracks().then(() => {
    if (playlist.length > 0) {
      playTrack(playlist[0]);
    } else {
      playGenerativeAmbience();
    }
  });
}

function playTrack(track) {
  if (!track || !audioCtx) return;
  fetch(track.url)
    .then(r => r.arrayBuffer())
    .then(ab => audioCtx.decodeAudioData(ab))
    .then(buffer => {
      fadeOutCurrent(() => {
        const src = audioCtx.createBufferSource();
        src.buffer = buffer;
        src.connect(gainNode);
        src.loop = false;
        src.start();
        currentSource = src;
        currentTrackName = track.name + (track.artist ? ` — ${track.artist}` : '');
        trackDisplay.textContent = '♪ ' + currentTrackName;
        trackDisplay.style.opacity = '1';

        gainNode.gain.setTargetAtTime(0.55, audioCtx.currentTime, 2.0);

        src.onended = () => {
          playlistIndex = (playlistIndex + 1) % playlist.length;
          setTimeout(() => {
            if (playlist[playlistIndex]) playTrack(playlist[playlistIndex]);
          }, 2000);
        };

        // Mood from track name heuristics
        updateMoodFromTrack(track.name);
      });
    })
    .catch(() => playGenerativeAmbience());
}

function fadeOutCurrent(cb) {
  if (currentSource && gainNode) {
    gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 1.2);
    setTimeout(() => {
      try { currentSource.stop(); } catch(e) {}
      if (cb) cb();
    }, 2000);
  } else {
    if (cb) cb();
  }
}

// Generative ambient fallback using Web Audio API
function playGenerativeAmbience() {
  if (!audioCtx) return;
  trackDisplay.textContent = '♪ Ambient Silence';
  trackDisplay.style.opacity = '1';

  const notes = [220, 246.94, 261.63, 293.66, 329.63, 349.23, 392, 440];
  let osc1, osc2, lfo;

  function scheduleNote() {
    if (!audioCtx || !audioStarted) return;
    const freq = notes[rndInt(0, notes.length - 1)] * (Math.random() < 0.5 ? 0.5 : 1);
    const when = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const envGain = audioCtx.createGain();
    osc.type = Math.random() < 0.5 ? 'sine' : 'triangle';
    osc.frequency.value = freq;
    envGain.gain.setValueAtTime(0, when);
    envGain.gain.linearRampToValueAtTime(0.04, when + 0.8);
    envGain.gain.exponentialRampToValueAtTime(0.001, when + rnd(3, 8));
    osc.connect(envGain);
    envGain.connect(gainNode);
    osc.start(when);
    osc.stop(when + 10);
    gainNode.gain.setTargetAtTime(0.6, audioCtx.currentTime, 2);
    setTimeout(scheduleNote, rnd(1000, 4000));
  }

  scheduleNote();

  // Pad drone
  const padFreqs = [110, 130.81, 164.81];
  for (const pf of padFreqs) {
    const padOsc = audioCtx.createOscillator();
    const padGain = audioCtx.createGain();
    padOsc.type = 'sine';
    padOsc.frequency.value = pf;
    padGain.gain.value = 0.015;
    padOsc.connect(padGain);
    padGain.connect(gainNode);
    padOsc.start();
  }

  creature.mood = 'melancholy';
  moodEl.textContent = 'melancholy';
}

function updateMoodFromTrack(name) {
  const n = (name || '').toLowerCase();
  if (n.includes('fast') || n.includes('dance') || n.includes('energy') || n.includes('beat')) {
    creature.mood = 'energetic';
    creature.moodSpeed = 1.6;
    moodEl.textContent = 'energetic';
  } else if (n.includes('sad') || n.includes('lone') || n.includes('mela') || n.includes('elegy')) {
    creature.mood = 'melancholy';
    creature.moodSpeed = 0.65;
    moodEl.textContent = 'melancholy';
  } else if (n.includes('curious') || n.includes('wonder') || n.includes('explore')) {
    creature.mood = 'curious';
    creature.moodSpeed = 1.1;
    moodEl.textContent = 'curious';
  } else {
    creature.mood = 'calm';
    creature.moodSpeed = 1.0;
    moodEl.textContent = 'calm';
  }
}

// ─── Sleep Veil ───────────────────────────────────────────────
function updateSleepVeil() {
  sleepVeil.style.opacity = creature.sleepAlpha * 0.6;
}

// ─── Main Loop ────────────────────────────────────────────────
function frame(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  t++;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Scene
  drawBackground();
  updateRain(); drawRain();
  updateParticles(); drawParticles();
  updateRipples(); drawRipples();

  // Creature
  creature.update(dt);
  creature.draw(ctx);

  // Vignette
  const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.9);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(5,8,16,0.72)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  updateSleepVeil();

  requestAnimationFrame(frame);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(frame); });
</script>
