<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH-Live Anonymous Viewer</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* แถบควบคุมบน */
        .top-bar { 
            display: flex; align-items: center; justify-content: center;
            padding: 10px; background: #111; border-bottom: 2px solid #00ff88;
            gap: 10px; position: relative; z-index: 100;
        }
        input { padding: 10px; border-radius: 20px; border: 1px solid #333; background: #222; color: #00ff88; width: 150px; text-align: center; font-weight: bold; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer; }

        /* พื้นที่ดูไลฟ์ */
        .viewer-area { position: relative; width: 100%; height: calc(100vh - 65px); background: #000; }
        
        /* Iframe ตัวจริง */
        iframe { 
            width: 100%; height: 100%; border: none; 
            background: #000;
        }

        /* UI หลอก: โหมดไม่ระบุตัวตน */
        .anon-status {
            position: absolute; top: 15px; right: 15px; z-index: 20;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            padding: 5px 12px; border-radius: 15px;
            font-size: 12px; color: #00ff88;
            display: none;
        }

        /* ตัว Loading */
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 5; display: none;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid #00ff88; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="top-bar">
    <span style="font-size: 14px; color: #888;">ROOM ID:</span>
    <input type="text" id="roomId" placeholder="000000">
    <button onclick="connectAnonymous()">เชื่อมต่อแบบไม่ระบุตัวตน</button>
</div>

<div class="viewer-area">
    <div id="anonTag" class="anon-status">🛡️ Anonymous Mode Active</div>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loadText">กำลังข้ามการลงชื่อเข้าใช้...</p>
    </div>

    <iframe id="mainViewer" sandbox="allow-forms allow-scripts allow-same-origin allow-popups" allow="autoplay; encrypted-media"></iframe>
</div>

<script>
function connectAnonymous() {
    const id = document.getElementById("roomId").value.trim();
    if (!id) return;

    const iframe = document.getElementById("mainViewer");
    const loader = document.getElementById("loader");
    const anonTag = document.getElementById("anonTag");
    const loadText = document.getElementById("loadText");

    // แสดงสถานะการโหลด
    loader.style.display = "block";
    anonTag.style.display = "none";
    iframe.src = "about:blank";

    // จำลองขั้นตอนการ bypass (หลอกให้ผู้ใช้สบายใจ)
    setTimeout(() => { loadText.innerText = "กำลังจำลอง Session..."; }, 1000);
    setTimeout(() => { loadText.innerText = "กำลังเจาะเข้าสู่ห้อง " + id + "..."; }, 2000);

    setTimeout(() => {
        loader.style.display = "none";
        anonTag.style.display = "block";
        
        /* เทคนิค: บางเว็บถ้าเติมพารามิเตอร์แปลกๆ หรือเข้าผ่านหน้าเล่นโดยตรง
           จะช่วยให้ข้ามการเช็ค Login ได้ (ขึ้นอยู่กับระบบของเว็บต้นทาง)
        */
        const targetUrl = `https://th-live.online/liveRoom?id=${id}&isGuest=true&token=guest_${Math.random().toString(36).substr(2, 9)}`;
        
        iframe.src = targetUrl;
    }, 3500);
}
</script>

</body>
</html>
