
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Recorder</title>
</head>
<body style="background:#111; color:white; text-align:center; font-family:sans-serif;">

<h2>🎥 อัดหน้าจอ (สลับแท็บได้)</h2>

<button onclick="startRecording()">เริ่มอัด</button>
<button onclick="stopRecording()">หยุด</button>

<p id="status">สถานะ: ยังไม่เริ่ม</p>

<script>
let mediaRecorder;
let recordedChunks = [];

async function startRecording() {
    const stream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true
    });

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) {
            recordedChunks.push(e.data);
        }
    };

    mediaRecorder.onstop = function() {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "recording.webm";
        a.click();
    };

    mediaRecorder.start();

    document.getElementById("status").innerText = "สถานะ: กำลังอัด (สลับแท็บได้)";
}
