<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Downloader</title>
    <style>
        :root { --ios-bg: #000000; --ios-card: #1c1c1e; --ios-blue: #0a84ff; --ios-text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--ios-bg); color: var(--ios-text); text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        textarea { width: 100%; height: 150px; background-color: var(--ios-card); border-radius: 14px; color: white; padding: 15px; border: none; outline: none; }
        .btn-primary { background-color: var(--ios-blue); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 600; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ดาวน์โหลด MP3</h1>
        <p>วางลิงก์วิดีโอ (YouTube) เพื่อแปลงเป็น MP3</p>
        <textarea id="links" placeholder="วางลิงก์ที่นี่..."></textarea>
        <button id="mainBtn" class="btn-primary" onclick="startDownload()">ดาวน์โหลดทั้งหมด</button>
    </div>

    <script>
        async function startDownload() {
            const list = document.getElementById("links").value.split("\n").filter(x => x.trim() !== "");
            const btn = document.getElementById("mainBtn");
            
            for (let url of list) {
                btn.innerText = "กำลังประมวลผล...";
                btn.disabled = true;

                const response = await fetch('convert', {
                    method: 'POST',
                    body: JSON.stringify({ url: url.trim() })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const a = document.createElement("a");
                    a.href = window.URL.createObjectURL(blob);
                    a.download = "music.mp3";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    alert("เกิดข้อผิดพลาดกับลิงก์: " + url);
                }
            }
            btn.innerText = "ดาวน์โหลดทั้งหมด";
            btn.disabled = false;
        }
    </script>
</body>
</html>
