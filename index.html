<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 เครื่องเล่นเพลงปีใหม่ (ไม่มีโฆษณา)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(135deg, #0b0f19, #16213e, #0f3460, #e94560); 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .player-container { 
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { 
            font-size: 26px; 
            margin-bottom: 5px; 
            color: #ffd700; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); 
        }
        .subtitle {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 25px;
        }
        .controls button { 
            background: #ffd700; 
            color: #1a1a2e; 
            border: none; 
            padding: 12px 20px; 
            margin: 5px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            transition: all 0.3s ease; 
        }
        .controls button:hover { 
            background: #fff; 
            transform: scale(1.05); 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }
        .playlist { 
            list-style: none; 
            padding: 0; 
            margin-top: 25px; 
            text-align: left; 
            max-height: 200px;
            overflow-y: auto;
        }
        .playlist li { 
            padding: 12px 15px; 
            background: rgba(255,255,255,0.05); 
            margin-bottom: 8px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex;
            align-items: center;
        }
        .playlist li:hover { 
            background: rgba(255,215,0,0.2); 
        }
        .playlist li.active { 
            background: rgba(255,215,0,0.3); 
            color: #ffd700; 
            border-left: 4px solid #ffd700;
        }
        .now-playing { 
            font-size: 16px; 
            margin-bottom: 20px; 
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            color: #fff; 
        }
        #track-name {
            color: #ffd700;
            font-weight: 500;
        }
        
        /* ซ่อน Scrollbar ของ Playlist */
        .playlist::-webkit-scrollbar { width: 5px; }
        .playlist::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>🎆 Happy New Year Party 🎆</h1>
        <div class="subtitle">เครื่องเล่นเพลงเทศกาล ไร้โฆษณาคั่น</div>
        
        <div class="now-playing">กำลังเล่น: <span id="track-name">ยังไม่ได้เลือกเพลง</span></div>

        <audio id="audio-player" src=""></audio>

        <div class="controls">
            <button onclick="prevTrack()">⏮</button>
            <button onclick="togglePlay()" id="play-btn">▶ เล่น</button>
            <button onclick="nextTrack()">⏭</button>
        </div>

        <ul class="playlist" id="playlist">
            <!-- รายชื่อเพลงจะถูกสร้างโดย JavaScript -->
        </ul>
    </div>

    <script>
        // ----------------------------------------------------
        // ตั้งค่ารายชื่อเพลงตรงนี้ (เปลี่ยนชื่อไฟล์ให้ตรงกับเพลงที่คุณมี)
        // ----------------------------------------------------
        const tracks = [
            { name: "1. เพลงแดนซ์มันส์ๆ รับปีใหม่", url: "song1.mp3" },
            { name: "2. เพลงชิลล์ๆ เคาท์ดาวน์", url: "song2.mp3" },
            { name: "3. พรปีใหม่", url: "song3.mp3" },
            { name: "4. เพลงปาร์ตี้สนุกๆ", url: "song4.mp3" }
        ];

        let currentTrackIndex = 0;
        const audioPlayer = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const trackNameDisplay = document.getElementById('track-name');
        const playlistContainer = document.getElementById('playlist');

        // สร้างรายการเพลงใน HTML
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.innerText = track.name;
                li.onclick = () => playTrack(index);
                playlistContainer.appendChild(li);
            });
        }

        function loadTrack(index) {
            audioPlayer.src = tracks[index].url;
            trackNameDisplay.innerText = tracks[index].name;
            updatePlaylistUI(index);
        }

        function playTrack(index) {
            currentTrackIndex = index;
            loadTrack(currentTrackIndex);
            audioPlayer.play();
            playBtn.innerText = "⏸ หยุดพัก";
        }

        function togglePlay() {
            if (audioPlayer.src === "" || audioPlayer.src.endsWith(window.location.pathname)) {
                loadTrack(currentTrackIndex);
            }

            if (audioPlayer.paused) {
                audioPlayer.play();
                playBtn.innerText = "⏸ หยุดพัก";
            } else {
                audioPlayer.pause();
                playBtn.innerText = "▶ เล่น";
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            playTrack(currentTrackIndex);
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            playTrack(currentTrackIndex);
        }

        function updatePlaylistUI(index) {
            const playlistElements = document.querySelectorAll('#playlist li');
            playlistElements.forEach((el, i) => {
                if (i === index) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        // เล่นเพลงถัดไปอัตโนมัติเมื่อเพลงจบ
        audioPlayer.addEventListener('ended', nextTrack);

        // เริ่มต้นการทำงาน
        renderPlaylist();
    </script>

</body>
</html>
