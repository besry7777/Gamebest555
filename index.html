<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Recorder</title>
</head>
<body style="background:#111; color:white; text-align:center; font-family:sans-serif;">

<h2>🎥 อัดหน้าจอ (สลับแท็บได้)</h2>

<button onclick="startRecording()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">เริ่มอัด</button>
<button onclick="stopRecording()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">หยุด</button>

<p id="status">สถานะ: ยังไม่เริ่ม</p>

<script>
let mediaRecorder;
let recordedChunks = [];
let currentStream; // เก็บค่า stream เพื่อไว้สั่งปิดการแชร์หน้าจอ

async function startRecording() {
    try {
        // ล้างข้อมูลเก่าทิ้งทุกครั้งที่กดเริ่มอัดใหม่
        recordedChunks = []; 
        
        currentStream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: true
        });

        mediaRecorder = new MediaRecorder(currentStream);

        mediaRecorder.ondataavailable = function(e) {
            if (e.data.size > 0) {
                recordedChunks.push(e.data);
            }
        };

        mediaRecorder.onstop = function() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = "recording.webm";
            document.body.appendChild(a);
            a.click();
            
            // คืนค่าหน่วยความจำหลังดาวน์โหลดเสร็จ
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        };

        // หากผู้ใช้กด "หยุดแชร์ (Stop sharing)" จากแถบของเบราว์เซอร์โดยตรง
        currentStream.getVideoTracks()[0].onended = function () {
            stopRecording();
        };

        mediaRecorder.start();
        document.getElementById("status").innerText = "สถานะ: กำลังอัด (สลับแท็บได้)";

    } catch (err) {
        console.error("Error: " + err);
        document.getElementById("status").innerText = "สถานะ: เกิดข้อผิดพลาด หรือยกเลิกการแชร์";
    }
}

function stopRecording() {
    // สั่งหยุดบันทึก
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
    
    // สั่งหยุด track ทั้งหมดเพื่อให้เบราว์เซอร์เลิกจับภาพ และสัญลักษณ์การแชร์หายไป
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    document.getElementById("status").innerText = "สถานะ: บันทึกเสร็จสิ้น และกำลังดาวน์โหลด";
}
</script>
</body>
</html>
