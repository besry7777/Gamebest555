<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ดูด SMS จาก API เว็บอื่น</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 400px; }
        .sms-item { padding: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .sender { font-weight: bold; color: #0066cc; }
        .otp { color: red; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h3>ดึงข้อมูลจากเบอร์: +66999999999</h3>
        <button onclick="fetchSMS()">🔄 รีเฟรชข้อความ</button>
        <hr>
        <div id="sms-container">
            <p style="color: gray;">คลิกปุ่มเพื่อดึงข้อความจาก API...</p>
        </div>
    </div>

    <script>
        function fetchSMS() {
            const container = document.getElementById('sms-container');
            container.innerHTML = "<p>กำลังดึงข้อมูล...</p>";

            // ⚠️ ตรงนี้คือ URL ของ API เว็บที่คุณไปเจอมา (อันนี้เป็น URL สมมติ)
            const apiUrl = 'https://api.fake-sms-website.com/get-messages?phone=66999999999';

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error("ดึงข้อมูลไม่สำเร็จ หรือติดบล็อก CORS");
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = ""; // เคลียร์ข้อความเก่า
                    
                    // สมมติว่า data มีหน้าตาเป็น Array ของข้อความ
                    data.messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = 'sms-item';
                        div.innerHTML = `
                            <div class="sender">จาก: ${msg.sender}</div>
                            <div>ข้อความ: <span class="otp">${msg.text}</span></div>
                            <div style="font-size:12px; color:gray;">เวลา: ${msg.time}</div>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch(error => {
                    // ถ้าดึงไม่ได้ (เช่น ติด CORS) จะเด้งมาตรงนี้
                    container.innerHTML = `<p style="color:red;">❌ เกิดข้อผิดพลาด: ${error.message}</p>
                    <p style="font-size: 13px; color: gray;">(ถ้า API ไม่มีอยู่จริง หรือติดล็อกข้ามโดเมน จะขึ้นข้อความนี้ครับ)</p>`;
                });
        }
    </script>

</body>
</html>
