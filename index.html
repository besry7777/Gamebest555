<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH Live ID Viewer - Pro</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* ส่วนควบคุมด้านบน */
        .header-box { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; position: relative; z-index: 100; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; width: 200px; }
        button { padding: 10px 15px; border-radius: 5px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #00cc6a; }

        /* ตัวเล่นวิดีโอ (Container) */
        .video-container { position: relative; width: 100%; height: calc(100vh - 80px); background: #000; }
        
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }

        /* UI หลอกว่ากำลัง Live */
        .live-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            display: flex; align-items: center; gap: 10px;
            pointer-events: none; /* ให้คลิกทะลุไปหา iframe ได้ */
            display: none; /* ซ่อนไว้ก่อนเริ่ม */
        }
        .badge-live { background: red; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; text-transform: uppercase; animation: blink 1s infinite; }
        .viewer-count { background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 14px; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* ตัว Loading หมุนๆ ตอนรอ */
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; display: none; text-align: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #00ff88; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-box">
    <strong>🔴 TH-LIVE:</strong> 
    <input type="text" id="roomId" placeholder="กรอก ID ห้อง...">
    <button onclick="startLive()">เข้าชมไลฟ์</button>
</div>

<div class="video-container">
    <div class="live-overlay" id="overlay">
        <div class="badge-live">LIVE</div>
        <div class="viewer-count">👁️ <span id="viewCount">0</span> คนกำลังดู</div>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p>กำลังเชื่อมต่อสัญญาณ...</p>
    </div>

    <iframe id="viewer" allowfullscreen></iframe>
</div>

<script>
function startLive() {
    const id = document.getElementById("roomId").value.trim();
    if (!id) return alert("ใส่ ID ด้วยครับ");

    const iframe = document.getElementById("viewer");
    const loader = document.getElementById("loader");
    const overlay = document.getElementById("overlay");
    const viewCount = document.getElementById("viewCount");

    // 1. แสดง Loading และซ่อน iframe แว็บนึง
    loader.style.display = "block";
    overlay.style.display = "none";
    iframe.src = ""; 

    // 2. สุ่มจำนวนคนดูปลอมๆ (เช่น 1,200 - 5,000)
    viewCount.innerText = Math.floor(Math.random() * (5000 - 1200 + 1)) + 1200;

    // 3. โหลด URL
    const targetUrl = "https://th-live.online/liveRoom?id=" + id;
    iframe.src = targetUrl;

    // 4. หลังจาก 2 วิ ให้เอา UI หลอกขึ้นมาทับ
    setTimeout(() => {
        loader.style.display = "none";
        overlay.style.display = "flex";
    }, 2000);
}
</script>

</body>
</html>
