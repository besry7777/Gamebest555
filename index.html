<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TH Live ID Viewer</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #0f0f0f;
        color: white;
        text-align: center;
    }
    input {
        width: 80%;
        max-width: 300px;
        padding: 12px;
        border-radius: 10px;
        border: none;
        margin-top: 20px;
        font-size: 16px;
        text-align: center;
    }
    .btn-group {
        margin-top: 15px;
    }
    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        background: #00ff88;
        font-weight: bold;
        cursor: pointer;
        color: #000;
        transition: 0.2s;
    }
    button:hover {
        background: #00cc6a;
    }
    button.alt-btn {
        background: #ff9900;
    }
    button.alt-btn:hover {
        background: #cc7a00;
    }
    iframe {
        width: 100%;
        height: 75vh;
        margin-top: 20px;
        border: none;
        background: #222;
    }
</style>
</head>

<body>

<h2>🔴 ใส่ ID คนไลฟ์</h2>

<input type="text" id="roomId" placeholder="เช่น 123456">

<div class="btn-group">
    <button onclick="loadLive()">ดูในหน้านี้</button>
    <button class="alt-btn" onclick="openNewTab()">เปิดแท็บใหม่</button>
</div>

<iframe id="viewer"></iframe>

<script>
function getTryUrls(id) {
    return [
        "https://th-live.online/liveRoom?id=" + id,
        "https://th-live.online/#/live/" + id
    ];
}

function loadLive() {
    const id = document.getElementById("roomId").value.trim();
    if (!id) {
        alert("กรุณาใส่ ID ก่อนครับ");
        return;
    }

    const urls = getTryUrls(id);
    const tryUrl1 = urls[0];
    const tryUrl2 = urls[1];

    // ใช้อันแรกแสดงใน iframe ก่อน
    document.getElementById("viewer").src = tryUrl1;

    // ระบบ Fallback ตรวจจับตามที่คุณเขียนมา (พยายามเปิดแท็บใหม่ถ้าขัดข้อง)
    setTimeout(() => {
        const iframe = document.getElementById("viewer");
        try {
            // เช็คว่า iframe ว่างเปล่าหรือไม่ (อาจติดปัญหา Cross-Origin)
            if (!iframe.contentWindow || iframe.contentWindow.length === 0) {
                console.log("Iframe load failed or empty, opening fallback url...");
                window.open(tryUrl2, "_blank");
            }
        } catch (e) {
            // ถ้าติด Block การเข้าถึงข้ามโดเมน จะตกลงมาที่นี่
            console.log("CORS error caught, opening in new tab...");
            window.open(tryUrl1, "_blank");
        }
    }, 3000);
}

function openNewTab() {
    const id = document.getElementById("roomId").value.trim();
    if (!id) {
        alert("กรุณาใส่ ID ก่อนครับ");
        return;
    }
    
    // บังคับเปิดแท็บใหม่ทันทีด้วย URL แรก
    const urls = getTryUrls(id);
    window.open(urls[0], "_blank");
}
</script>
</body>
</html>
