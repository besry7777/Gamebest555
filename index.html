<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Background & PiP</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #1a1a1a;
            color: white;
            padding: 50px;
        }
        .video-container {
            max-width: 800px;
            margin: 0 auto;
        }
        video {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <h2>ทดสอบระบบเล่นวิดีโอต่อเนื่อง (Picture-in-Picture)</h2>
        <p>กดปุ่มด้านล่างเพื่อทำให้วิดีโอลอยขึ้นมา คุณสามารถเปลี่ยนไปแท็บอื่นได้โดยที่วิดีโอยังเล่นอยู่</p>

        <video id="myVideo" controls autoplay loop>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            เบราว์เซอร์ของคุณไม่รองรับการเล่นวิดีโอ
        </video>

        <br>
        <button id="pipButton">ย่อเป็นหน้าต่างลอย (Picture-in-Picture)</button>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const pipButton = document.getElementById('pipButton');

        // เช็คว่าเบราว์เซอร์รองรับ Picture-in-Picture หรือไม่
        if ('pictureInPictureEnabled' in document) {
            pipButton.addEventListener('click', async () => {
                try {
                    // ถ้าวิดีโอลอยอยู่แล้ว ให้ดึงกลับมา
                    if (document.pictureInPictureElement) {
                        await document.exitPictureInPicture();
                        pipButton.textContent = 'ย่อเป็นหน้าต่างลอย (Picture-in-Picture)';
                    } else {
                        // ถ้ายังไม่ลอย ให้สั่งให้ลอย
                        await video.requestPictureInPicture();
                        pipButton.textContent = 'นำวิดีโอกลับเข้าเว็บ';
                    }
                } catch (error) {
                    console.error('เกิดข้อผิดพลาด:', error);
                    alert('เกิดข้อผิดพลาดในการเปิดหน้าต่างลอย');
                }
            });
            
            // อัปเดตข้อความปุ่มอัตโนมัติเมื่อผู้ใช้กดกากบาทปิดหน้าต่างลอย
            video.addEventListener('leavepictureinpicture', () => {
                pipButton.textContent = 'ย่อเป็นหน้าต่างลอย (Picture-in-Picture)';
            });

        } else {
            // ถ้าเบราว์เซอร์ไม่รองรับ
            pipButton.disabled = true;
            pipButton.textContent = 'เบราว์เซอร์ของคุณไม่รองรับฟีเจอร์นี้';
        }
    </script>

</body>
</html>
