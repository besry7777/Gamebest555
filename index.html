<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>MP3 Batch Downloader</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:30px;
}
textarea{
    width:90%;
    height:250px;
    font-size:16px;
    padding:10px;
}
button{
    padding:15px 35px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
}
</style>

</head>
<body>

<h1>โหลด MP3 หลายเพลง</h1>

<p>วางลิงก์ MP3 ทีละบรรทัด</p>

<textarea id="links">
https://example.com/song1.mp3
https://example.com/song2.mp3
https://example.com/song3.mp3
</textarea>

<br>

<button onclick="downloadAll()">ดาวน์โหลดทั้งหมด</button>

<script>

function downloadAll(){

let list=document.getElementById("links").value
.split("\n")
.filter(x=>x.trim()!="");

let delay=0;

list.forEach(link=>{

setTimeout(()=>{

let a=document.createElement("a");
a.href=link.trim();
a.download="";
document.body.appendChild(a);
a.click();
a.remove();

},delay);

delay+=1200;

});

}

</script>

</body>
</html>
